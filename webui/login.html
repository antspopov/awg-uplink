<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AWG Split Gate — вход</title>
    <base id="baseTag" href="./" />
    <link rel="stylesheet" href="./styles.css?v=20260509-11" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="login-brand">
          <div class="logo" title="AWG Split Gate" aria-label="AWG Split Gate">
            <span class="logo__mark">AWG</span>
            <span class="logo__divider" aria-hidden="true"></span>
            <span class="logo__gate">SG</span>
          </div>
          <div>
            <div class="title">AWG Split Gate</div>
            <div class="subtitle">Вход в панель управления</div>
          </div>
        </div>

        <div class="login-form">
          <div class="field">
            <label>Логин</label>
            <input id="loginUser" type="text" autocomplete="username" placeholder="например: admin" />
          </div>
          <div class="field field--spaced">
            <label>Пароль</label>
            <input
              id="loginPass"
              type="password"
              autocomplete="current-password"
              placeholder="пароль"
            />
          </div>

          <div class="login-actions">
            <button class="btn btn--primary" id="loginBtn" type="button">Войти</button>
            <div class="help" id="loginHelp">Авторизация: digest (challenge-response).</div>
          </div>
        </div>
      </div>
      <div class="login-page-version" id="loginPageVersion" aria-live="polite"></div>
    </div>

    <script src="./config.js"></script>
    <script src="./login.js"></script>
  </body>
</html>
